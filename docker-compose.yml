version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: ais_postgres
    environment:
      POSTGRES_DB: ais_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      - ./sql/postgres/indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-master:
    image: bitnami/spark:3.5
    container_name: ais_spark_master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./:/opt/project

  spark-worker:
    image: bitnami/spark:3.5
    container_name: ais_spark_worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - ./:/opt/project

  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: ais_airflow_webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/ais_analytics
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
    ports:
      - "8081:8080"
    volumes:
      - ./orchestration/airflow_dags:/opt/airflow/dags
      - ./:/opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@local.dev || true &&
        airflow webserver
      "

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    container_name: ais_airflow_scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/ais_analytics
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
    volumes:
      - ./orchestration/airflow_dags:/opt/airflow/dags
      - ./:/opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
    command: airflow scheduler

volumes:
  postgres_data:
